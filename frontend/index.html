<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Inventory Management System
    </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>
            Inventory Management System
        </h1>
        <form id="itemForm">
            <div class="form-container">
                <div class="form-group">
                    <label>
                        Item Name
                    </label>
                    <input type="text" id="name" placeholder="Enter Item Name" required>
                </div>
                
                <div class="form-group">
                    <label>
                        Item Type
                    </label>
                    <select id="itemType" required>
                        <option value="">
                            Select Type
                        </option>
                        <option value="1">
                            Electronics
                        </option>
                        <option value="2">
                            Furniture
                        </option>
                        <option value="3">
                            Clothing
                        </option>
                        <option value="4">
                            Books
                        </option>
                        <option value="5">
                            Sports
                        </option>
                    </select>
                </div>
                   <div class="form-group">
                    <label>
                        Purchase Date
                    </label>
                    <input type="date" id="purchaseDate" required>
                </div>
                <div class="form-group stock-group">
                    <input type="checkbox" id="stockAvailable">
                    <label>
                        Stock Available
                    </label>
                </div>
            </div>
            <div class="button-group">
                <button type="button" id="addMoreBtn">
                    Add More
                </button>
                <button type="submit">
                    Submit Purchase
                </button>
            </div>
        </form>
        <table>
              <thead>
                <tr>
                    <th>ID</th>
                    <th>Item Name</th>
                    <th>Item Type</th>
                    <th>Purchase Date</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
